    <body>
        <header>
            <h1>JARVIS VOICE ASSISTANT</h1>
        </header>

        <div class="container">
            <div class="assistant-face">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>

            <div class="input-container">
                <input type="text" id="command-input" placeholder="Give me a command..." autocomplete="off">
                <button id="send-button">Send</button>
                <button id="speak" onclick="startListening()">Speak</button>
            </div>



            <div class="response-area" id="response-area">
                <p class="response-text" id="response-text">Initializing Jarvis...</p>
            </div>
        </div>
        <p></p>
        <div class="container">

            <h6>
                &#9888; Use jarvis locally for better experiance
            </h6>
        </div>
        <script>
            function startListening() {
                const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
                recognition.lang = 'en-US'; // ভাষা ঠিক করো, চাইলে 'bn-BD' ও দিতে পারো বাংলার জন্য
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;

                recognition.start();

                recognition.onresult = function (event) {
                    const speechToText = event.results[0][0].transcript;
                    document.getElementById('transcript').innerText = speechToText;

                    // এখন এই speech text server-এ পাঠাতে পারো:
                    fetch('/api/command', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ command: speechToText })
                    })
                        .then(response => response.json())
                        .then(data => {
                            console.log('Server Response:', data);
                            alert(data.text);  // বা সুন্দর করে ওয়েবপেজে দেখাতে পারো
                        })
                        .catch((error) => {
                            console.error('Error:', error);
                        });
                };

                recognition.onerror = function (event) {
                    console.error('Error occurred in recognition:', event.error);
                };
            }
        </script>


        <footer>
            &copy; 2025 Jarvis Voice Assistant
        </footer>

        <!-- Previous HTML remains the same until the script section -->
        <script>
            document.addEventListener('DOMContentLoaded', function () {
                const commandInput = document.getElementById('command-input');
                const sendButton = document.getElementById('send-button');
                const responseText = document.getElementById('response-text');
                const featureButtons = document.querySelectorAll('.feature-btn');

                // Initialize speech synthesis
                const synth = window.speechSynthesis;

                // Function to speak text
                function speak(text) {
                    if (synth.speaking) {
                        synth.cancel();
                    }

                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.voice = synth.getVoices().find(voice => voice.name.includes('Microsoft Zira'));
                    utterance.rate = 1.1;
                    utterance.pitch = 1;
                    utterance.volume = 0.9;
                    synth.speak(utterance);
                }

                // Function to simulate typing effect
                function typeResponse(text, callback) {
                    responseText.innerHTML = '';
                    let i = 0;
                    const typingInterval = setInterval(() => {
                        if (i < text.length) {
                            responseText.innerHTML += text.charAt(i);
                            i++;
                            // Scroll to bottom of response area
                            const responseArea = document.getElementById('response-area');
                            responseArea.scrollTop = responseArea.scrollHeight;
                        } else {
                            clearInterval(typingInterval);
                            if (callback) callback();
                        }
                    }, 20);
                }

                // Function to send command to backend
                async function sendCommand(command) {
                    // Show typing indicator
                    responseText.innerHTML = '<span class="typing">Jarvis is thinking...</span>';

                    try {
                        const response = await fetch('/api/command', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({ command: command })
                        });

                        const data = await response.json();

                        if (data.error) {
                            typeResponse(data.text);
                            speak("Sorry, I encountered an error.");
                            return;
                        }

                        typeResponse(data.text, () => {
                            speak(data.text);
                        });

                        // Handle special actions
                        if (data.action) {
                            switch (data.action.type) {
                                case 'open_website':
                                    window.open(data.action.url, '_blank');
                                    break;
                                case 'open_youtube':
                                    window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(data.action.query)}`, '_blank');
                                    break;
                                case 'search_web':
                                    window.open(`https://www.google.com/search?q=${encodeURIComponent(data.action.query)}`, '_blank');
                                    break;
                            }
                        }
                    } catch (error) {
                        const errorMsg = "Sorry, I couldn't connect to the server.";
                        typeResponse(errorMsg);
                        speak(errorMsg);
                        console.error('Error:', error);
                    }
                }

                // Initialize greeting
                async function initializeGreeting() {
                    try {
                        const response = await fetch('/api/init');
                        const data = await response.json();
                        typeResponse(data.text, () => {
                            speak(data.text);
                        });
                    } catch (error) {
                        const greeting = "";
                        typeResponse(greeting);
                        speak(greeting);
                    }
                }

                // Event listeners
                sendButton.addEventListener('click', () => {
                    const command = commandInput.value.trim();
                    if (command) {
                        sendCommand(command.toLowerCase());
                        commandInput.value = '';
                    }
                });

                commandInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        const command = commandInput.value.trim();
                        if (command) {
                            sendCommand(command.toLowerCase());
                            commandInput.value = '';
                        }
                    }
                });

                // Feature buttons
                featureButtons.forEach(button => {
                    button.addEventListener('click', () => {
                        const command = button.getAttribute('data-command');
                        commandInput.value = command;
                        sendCommand(command.toLowerCase());
                    });
                });

                // Initialize the assistant
                initializeGreeting();
            });
        </script>
    </body>
